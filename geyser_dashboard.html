<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geyser PRO</title>
<script src="/local/geyser_token.js" onerror=""></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #181b24;
    --surface2: #1e2230;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #e8eaf0;
    --muted: #6b7280;
    --green: #22d3a0;
    --green-dim: rgba(34,211,160,0.12);
    --amber: #f59e0b;
    --amber-dim: rgba(245,158,11,0.12);
    --red: #ef4444;
    --red-dim: rgba(239,68,68,0.12);
    --blue: #60a5fa;
    --blue-dim: rgba(96,165,250,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 20px;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
    justify-content: space-between;
  }

  .logo {
    width: 36px; height: 36px;
    background: var(--green-dim);
    border: 1px solid var(--green);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  .header-title { font-size: 17px; font-weight: 500; }
  .header-sub { font-size: 12px; color: var(--muted); margin-top: 1px; font-family: 'DM Mono', monospace; }

  .status-pill {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    font-family: 'DM Mono', monospace;
    background: var(--green-dim);
    color: var(--green);
    border: 1px solid rgba(34,211,160,0.25);
    display: flex; align-items: center; gap: 6px;
  }

  .status-pill .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 12px; }
  .grid4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 12px; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
  }

  .card-label {
    font-size: 10px;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }

  .card-value {
    font-size: 28px;
    font-weight: 300;
    font-family: 'DM Mono', monospace;
    color: var(--text);
    line-height: 1;
  }

  .card-sub {
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
  }

  .bar-track {
    background: var(--surface2);
    border-radius: 4px;
    height: 4px;
    margin-top: 8px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.6s ease;
  }

  .section-title {
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 10px;
    margin-top: 4px;
  }

  .full-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 12px;
  }

  .row-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .row-item:last-child { border-bottom: none; padding-bottom: 0; }
  .row-item:first-child { padding-top: 0; }

  .row-name { flex: 1; font-size: 13px; }
  .row-sub { font-size: 11px; color: var(--muted); margin-top: 2px; font-family: 'DM Mono', monospace; }

  .toggle {
    position: relative;
    width: 40px; height: 22px; flex-shrink: 0;
  }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .tog-slider {
    position: absolute; inset: 0;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 22px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tog-slider:before {
    content: '';
    position: absolute;
    width: 16px; height: 16px;
    left: 2px; top: 2px;
    background: var(--muted);
    border-radius: 50%;
    transition: all 0.2s;
  }
  .toggle input:checked + .tog-slider {
    background: rgba(34,211,160,0.15);
    border-color: var(--green);
  }
  .toggle input:checked + .tog-slider:before {
    transform: translateX(18px);
    background: var(--green);
  }

  .qs-form { display: flex; flex-direction: column; gap: 12px; }

  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-size: 11px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; }

  select, input[type=range] {
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    width: 100%;
    appearance: none;
    -webkit-appearance: none;
  }

  select:focus { outline: none; border-color: var(--green); }

  input[type=range] {
    padding: 0;
    height: 4px;
    accent-color: var(--green);
    cursor: pointer;
  }

  .range-row { display: flex; align-items: center; gap: 10px; }
  .range-val { font-size: 13px; font-weight: 500; font-family: 'DM Mono', monospace; color: var(--green); min-width: 36px; text-align: right; }

  .btn-launch {
    background: var(--green);
    color: #0f1117;
    border: none;
    border-radius: 10px;
    padding: 12px;
    font-size: 14px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    width: 100%;
    transition: opacity 0.2s, transform 0.1s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-launch:hover { opacity: 0.85; }
  .btn-launch:active { transform: scale(0.98); }
  .btn-launch:disabled { background: var(--surface2); color: var(--muted); cursor: not-allowed; }

  .alert-box {
    background: var(--red-dim);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 13px;
    color: #fca5a5;
    display: none;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }

  .conn-status {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    text-align: center;
    margin-top: 16px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }

  .nebulizing {
    background: var(--blue-dim);
    border-color: rgba(96,165,250,0.3);
  }
  .nebulizing .dot { background: var(--blue); animation: pulse 0.8s infinite; }
  .nebulizing { color: var(--blue); }

  .btn-delete {
    background: none; border: none; color: var(--muted);
    cursor: pointer; padding: 6px 10px; font-size: 18px;
    border-radius: 6px; transition: color 0.2s, background 0.2s;
    flex-shrink: 0;
  }
  .btn-delete:hover { color: var(--red); background: var(--red-dim); }
  .btn-add {
    background: none; border: 1px dashed var(--border2);
    color: var(--green); cursor: pointer; padding: 10px;
    border-radius: 8px; font-size: 13px; font-weight: 500; width: 100%;
    margin-top: 8px; transition: all 0.2s;
  }
  .btn-add:hover { border-color: var(--green); background: var(--green-dim); }
  .strategy-group-header {
    font-size: 14px; font-weight: 700; color: var(--text);
    padding: 10px 0 4px; display: flex; align-items: center;
    justify-content: space-between; border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
  }
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.7); z-index: 100;
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: 16px; padding: 24px; width: 400px; max-width: 90vw;
  }
  .modal-title { font-size: 15px; font-weight: 500; margin-bottom: 16px; }
  .modal-field { margin-bottom: 12px; }
  .modal-field label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; display: block; margin-bottom: 6px; }
  .modal-field input, .modal-field select { width: 100%; background: var(--surface2); border: 1px solid var(--border2); color: var(--text); border-radius: 8px; padding: 8px 12px; font-size: 13px; font-family: inherit; }
  .modal-field input:focus, .modal-field select:focus { outline: none; border-color: var(--green); }
  .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .day-btn { background: var(--surface2); border: 1px solid var(--border2); color: var(--muted); border-radius: 6px; padding: 6px 4px; font-size: 11px; cursor: pointer; text-align: center; transition: all 0.2s; }
  .day-btn.active { background: var(--green-dim); border-color: var(--green); color: var(--green); }
  .modal-actions { display: flex; gap: 8px; margin-top: 16px; }
  .btn-cancel { flex: 1; background: var(--surface2); border: 1px solid var(--border2); color: var(--muted); border-radius: 8px; padding: 10px; cursor: pointer; font-family: inherit; }
  .btn-confirm { flex: 2; background: var(--green); border: none; color: #0f1117; border-radius: 8px; padding: 10px; cursor: pointer; font-weight: 500; font-family: inherit; }
</style>
</head>
<body>

<div class="header">
  <div style="display:flex; align-items:center; gap:12px; flex:1;">
    <div class="logo" style="width:44px;height:44px;font-size:22px;border-radius:12px;">💧</div>
    <div>
      <div style="display:flex; align-items:center; gap:8px;">
        <div class="header-title" style="font-size:22px; font-weight:500;">Geyser PRO</div>
        <span id="conn-dot" style="display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--amber);transition:background 0.3s;flex-shrink:0;" title="Stato connessione"></span>
      </div>
      <div class="header-sub" id="last-sync" style="font-size:13px; margin-top:2px;">Stocker — sincronizzazione...</div>
    </div>
  </div>
  <div class="status-pill" id="stato-pill" style="font-size:15px; padding:8px 20px; gap:10px;">
    <div class="dot" style="width:10px; height:10px;"></div>
    <span id="stato-text" style="font-weight:500;">—</span>
  </div>
  <div style="flex:1; display:flex; justify-content:flex-end;">
    <button id="sync-btn" onclick="syncNow()" title="Sincronizza con webapp" style="
      background:none; border:1px solid var(--border2); color:var(--muted);
      border-radius:10px; padding:10px 18px; cursor:pointer; font-size:14px;
      font-family:inherit; display:flex; align-items:center; gap:8px;
      transition: all 0.2s; white-space:nowrap;">
      🔄 Sync
    </button>
  </div>
</div>

<div id="alert-box" class="alert-box">
  ⚠ Allarme attivo
</div>

<div class="grid4">
  <div class="card">
    <div class="card-label">Batteria</div>
    <div class="card-value" id="batteria">—</div>
    <div class="bar-track"><div class="bar-fill" id="bar-bat" style="width:0%"></div></div>
  </div>
  <div class="card">
    <div class="card-label">Serbatoio 1</div>
    <div class="card-value" id="s1-pct">—</div>
    <div class="card-sub" id="s1-name">—</div>
    <div class="bar-track"><div class="bar-fill" id="bar-s1" style="width:0%"></div></div>
  </div>
  <div class="card">
    <div class="card-label">Serbatoio 2</div>
    <div class="card-value" id="s2-pct">—</div>
    <div class="card-sub" id="s2-name">—</div>
    <div class="bar-track"><div class="bar-fill" id="bar-s2" style="width:0%"></div></div>
  </div>
  <div class="card">
    <div class="card-label">Prossimo trattamento</div>
    <div class="card-value" style="font-size:16px; padding-top:6px;" id="next-t">—</div>
    <div class="card-sub" id="qs-status-text">Quick Start: —</div>
  </div>
</div>

<div class="grid">
  <div>
    <div class="full-card">
      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;">
        <span class="section-title" style="margin:0;">Strategie</span>
        <div style="display:flex; gap:6px;">
          <button id="tab-zona1" onclick="setZonaTab(1)" style="padding:4px 10px; border-radius:6px; font-size:11px; font-weight:500; cursor:pointer; border:1px solid var(--green); background:var(--green-dim); color:var(--green);">Zona 1</button>
          <button id="tab-zona2" onclick="setZonaTab(2)" style="padding:4px 10px; border-radius:6px; font-size:11px; font-weight:500; cursor:pointer; border:1px solid var(--border2); background:none; color:var(--muted);">Zona 2</button>
        </div>
      </div>
      <div id="strategies-list">
        <div class="row-item" style="color:var(--muted); font-size:13px;">Caricamento...</div>
      </div>
    </div>
    <div class="full-card">
      <div class="section-title">Cicli</div>
      <div id="cycles-list">
        <div class="row-item" style="color:var(--muted); font-size:13px;">Caricamento...</div>
      </div>
    </div>
  </div>

  <div class="full-card">
    <div class="section-title">Quick Start</div>
    <div class="qs-form">
      <div class="field">
        <label>Liquido</label>
        <select id="qs-tank">
          <option value="1" id="opt-s1">Serbatoio 1</option>
          <option value="2" id="opt-s2">Serbatoio 2</option>
          <option value="0">Pulizia</option>
        </select>
      </div>
      <div class="field">
        <label>Zona di uscita</label>
        <select id="qs-zone">
          <option value="1">Zona 1</option>
          <option value="2">Zona 2</option>
        </select>
      </div>
      <div class="field">
        <label>Durata</label>
        <div class="range-row">
          <input type="range" id="qs-dur" min="5" max="150" step="5" value="30">
          <span class="range-val" id="qs-dur-label">30s</span>
        </div>
      </div>
      <button class="btn-launch" id="qs-btn" onclick="launchQuickstart()">
        ▶ Avvia nebulizzazione
      </button>
      <div id="qs-feedback" style="font-size:12px; color:var(--muted); text-align:center; min-height:16px;"></div>
    </div>
  </div>
</div>



<script>
const HA_URL = window.location.origin;
let TOKEN = (typeof GEYSER_TOKEN !== 'undefined' && GEYSER_TOKEN)
  ? GEYSER_TOKEN
  : (document.querySelector('meta[name="ha-access-token"]')?.content || '');
// Nota: inserisci il token manualmente qui sotto se non usi l'opzione addon
// TOKEN = 'IL_TUO_TOKEN';
let _zoneName1 = 'Zona 1';
let _zoneName2 = 'Zona 2';

let haStates = {};
let wsConn   = null;
let wsId     = 1;

document.getElementById('qs-dur').oninput = function() {
  document.getElementById('qs-dur-label').textContent = this.value + 's';
};

function barColor(v) {
  return v > 30 ? var_('--green') : v > 15 ? var_('--amber') : var_('--red');
}
function var_(n) {
  return getComputedStyle(document.documentElement).getPropertyValue(n).trim();
}

function setBar(id, pct) {
  const el = document.getElementById(id);
  if (!el) return;
  el.style.width = Math.min(100, pct) + '%';
  el.style.background = barColor(pct);
}

let _lastStates = [];
function updateUI(states) {
  haStates = states;
  _lastStates = states;

  // Nomi zona da sensori HA
  const _z1 = states.find(s => s.entity_id === 'sensor.geyser_pro_zona_1_nome');
  const _z2 = states.find(s => s.entity_id === 'sensor.geyser_pro_zona_2_nome');
  if (_z1 && _z1.state && !['unknown','unavailable'].includes(_z1.state)) { _zoneName1 = _z1.state; }
  if (_z2 && _z2.state && !['unknown','unavailable'].includes(_z2.state)) { _zoneName2 = _z2.state; }
  const _tb1 = document.getElementById('tab-zona1'); if (_tb1) _tb1.textContent = _zoneName1;
  const _tb2 = document.getElementById('tab-zona2'); if (_tb2) _tb2.textContent = _zoneName2;

  const get = (eid) => {
    const s = states.find(s => s.entity_id === eid);
    return s ? s.state : null;
  };

  const stato = get('sensor.geyser_pro_stato') || '—';
  document.getElementById('stato-text').textContent = stato;

  const pill = document.getElementById('stato-pill');
  pill.className = 'status-pill';
  if (stato === 'Nebulizzazione' || stato === 'Preparazione') pill.classList.add('nebulizing');

  const alert = get('binary_sensor.geyser_pro_allarme');
  document.getElementById('alert-box').style.display = alert === 'on' ? 'flex' : 'none';

  const bat = parseInt(get('sensor.geyser_pro_batteria')) || 0;
  document.getElementById('batteria').textContent = bat + '%';
  setBar('bar-bat', bat);

  const s1 = parseInt(get('sensor.geyser_pro_serbatoio_1')) || 0;
  const s2 = parseInt(get('sensor.geyser_pro_serbatoio_2')) || 0;
  document.getElementById('s1-pct').textContent = s1 + '%';
  document.getElementById('s2-pct').textContent = s2 + '%';
  setBar('bar-s1', s1);
  setBar('bar-s2', s2);

  const l1 = get('sensor.geyser_pro_liquido_serbatoio_1') || '';
  const l2 = get('sensor.geyser_pro_liquido_serbatoio_2') || '';
  const l1name = l1.split('(')[0].trim() || 'Serbatoio 1';
  const l2name = l2.split('(')[0].trim() || 'Serbatoio 2';
  document.getElementById('s1-name').textContent = l1name || '—';
  document.getElementById('s2-name').textContent = l2name || '—';

  const opt1 = document.getElementById('opt-s1');
  const opt2 = document.getElementById('opt-s2');
  if (l1) opt1.textContent = 'S1 — ' + l1name;
  if (l2) opt2.textContent = 'S2 — ' + l2name;

  // Aggiorna anche il modal ciclo
  const co1 = document.getElementById('cycle-opt-s1');
  const co2 = document.getElementById('cycle-opt-s2');
  if (co1 && l1) co1.textContent = l1name;
  if (co2 && l2) co2.textContent = l2name;

  const next = get('sensor.geyser_pro_prossimo_trattamento') || '—';
  document.getElementById('next-t').textContent = next.split(' - ')[0] || next;

  const sync = get('sensor.geyser_pro_ultimo_sync') || '';
  if (sync) document.getElementById('last-sync').textContent = 'Stocker — sync ' + sync;

  const qsAvail = get('binary_sensor.geyser_pro_quick_start_disponibile');
  const qsAttivo = get('binary_sensor.geyser_pro_quick_start_attivo');
  const qsBtn = document.getElementById('qs-btn');
  const qsText = document.getElementById('qs-status-text');

  if (qsAttivo === 'on') {
    qsText.textContent = 'Quick Start: in corso...';
    qsBtn.disabled = true;
    qsBtn.textContent = '⏳ In corso...';
  } else if (qsAvail === 'off') {
    qsText.textContent = 'Quick Start: non disponibile';
    qsBtn.disabled = true;
    qsBtn.textContent = '🚫 Non disponibile';
  } else {
    qsText.textContent = 'Quick Start: disponibile';
    qsBtn.disabled = false;
    qsBtn.innerHTML = '▶ Avvia nebulizzazione';
  }

  buildStrategies(states);
  buildCycles(states);
}

function buildStrategies(states) {
  const list = document.getElementById('strategies-list');
  let switches = states.filter(s => s.entity_id.startsWith('switch.geyser_pro_strategia_'));
  if (!switches.length) { list.innerHTML = ''; return; }
  // Filtra per zona corrente
  switches = switches.filter(s => {
    const ov = s.attributes && s.attributes.output_valve;
    return ov === undefined || parseInt(ov) === _currentZona;
  });
  list.innerHTML = '';
  switches.forEach(s => {
    const rawId = s.entity_id.replace('switch.geyser_pro_strategia_strategia_', '').replace('switch.geyser_pro_strategia_', '');
    // strategy_id dall'attributo MQTT (più affidabile)
    const numId = s.attributes && s.attributes.strategy_id
      ? String(s.attributes.strategy_id)
      : (rawId.match(/\d+/) || [null])[0];
    const name = (s.attributes.friendly_name || ('Strategia ' + rawId)).replace('Geyser PRO ', '').replace('Strategia: ', '');
    const active = s.state === 'on';
    const div = document.createElement('div');
    div.className = 'row-item';
    div.innerHTML = `
      <div style="flex:1">
        <div class="row-name">${name}</div>
      </div>
      <label class="toggle" style="margin-right:6px;">
        <input type="checkbox" ${active ? 'checked' : ''} onchange="callService('switch', this.checked ? 'turn_on' : 'turn_off', '${s.entity_id}')">
        <span class="tog-slider"></span>
      </label>
      ${numId ? `<button class="btn-delete" onclick="deleteStrategy(${numId})" title="Elimina">🗑</button>` : ''}`;
    list.appendChild(div);
  });
  // Bottone nuova strategia
  const addBtn = document.createElement('button');
  addBtn.className = 'btn-add';
  addBtn.textContent = '＋ Nuova strategia';
  addBtn.onclick = () => openModal('modal-strategy');
  list.appendChild(addBtn);
}

function buildCycles(states) {
  const list = document.getElementById('cycles-list');
  // Mappa strategy_id → zona
  const stratZoneMap = {};
  states.filter(s => s.entity_id.startsWith('switch.geyser_pro_strategia_')).forEach(s => {
    const sid = s.attributes && s.attributes.strategy_id;
    const ov  = parseInt(s.attributes && s.attributes.output_valve) || 1;
    if (sid !== undefined) stratZoneMap[String(sid)] = ov;
  });
  // Cicli della zona corrente
  const allCycles = states.filter(s => {
    if (!s.entity_id.startsWith('switch.geyser_pro') || s.entity_id.includes('strategia_')) return false;
    const sid = s.attributes && s.attributes.strategy_id;
    if (sid === undefined) return true;
    return (stratZoneMap[String(sid)] || 1) === _currentZona;
  });
  list.innerHTML = '';
  if (!allCycles.length) return;

  // Strategie della zona corrente
  const zoneStrategies = states.filter(s =>
    s.entity_id.startsWith('switch.geyser_pro_strategia_') &&
    (s.attributes.output_valve === undefined || parseInt(s.attributes.output_valve) === _currentZona)
  );
  const zoneStratNames = new Set(zoneStrategies.map(s =>
    (s.attributes.friendly_name || '').replace('Geyser PRO ', '').replace('Strategia: ', '')
  ));

  // Raggruppa cicli per nome strategia
  const byStrategy = {};
  allCycles.forEach(s => {
    const fn = (s.attributes.friendly_name || '').replace('Geyser PRO ', '');
    const stratName = fn.split(':')[0].trim();
    if (!byStrategy[stratName]) byStrategy[stratName] = [];
    byStrategy[stratName].push(s);
  });

  // Aggiungi strategie di zona senza cicli (così compare il tasto + ciclo)
  zoneStrategies.forEach(s => {
    const sn = (s.attributes.friendly_name||'').replace('Geyser PRO ','').replace('Strategia: ','');
    if (!byStrategy[sn]) byStrategy[sn] = [];
  });

  Object.entries(byStrategy).forEach(([stratName, cycles]) => {
    if (!zoneStratNames.has(stratName)) return;
    const header = document.createElement('div');
    header.className = 'strategy-group-header';
    const stratSwitch = zoneStrategies.find(s =>
      (s.attributes.friendly_name||'').replace('Geyser PRO ','').replace('Strategia: ','') === stratName
    );
    // Usa strategy_id dall'attributo MQTT (funziona anche per nomi senza cifre)
    const stratId = stratSwitch
      ? (stratSwitch.attributes.strategy_id
          ? String(stratSwitch.attributes.strategy_id)
          : (stratSwitch.entity_id.match(/\d+/) || [null])[0])
      : null;
    header.innerHTML = `<span>${stratName}</span>${stratId ? `<button class="btn-add" style="width:auto;margin:0;padding:2px 8px;font-size:11px;" onclick="openCreateCycle(${stratId})">+ ciclo</button>` : ''}`;
    list.appendChild(header);
    const stratActive = stratSwitch ? stratSwitch.state === 'on' : true;
    cycles.forEach(s => {
      const fn = (s.attributes.friendly_name || '').replace('Geyser PRO ', '');
      const name = fn.split(':').slice(1).join(':').trim() || fn;
      const m = s.entity_id.match(/ciclo_(\d+)/);
      // cycle_id dall'attributo MQTT (più affidabile per cicli creati da HA)
      const cycleId = s.attributes && s.attributes.cycle_id
        ? String(s.attributes.cycle_id)
        : (m ? m[1] : null);
      const active = s.state === 'on';
      const div = document.createElement('div');
      div.className = 'row-item';
      if (!stratActive) div.style.opacity = '0.35';
      div.innerHTML = `
        <div style="flex:1"><div class="row-name" style="font-size:13px;">${name}</div></div>
        <label class="toggle" style="margin-right:6px;">
          <input type="checkbox" ${active ? 'checked' : ''} onchange="callService('switch', this.checked ? 'turn_on' : 'turn_off', '${s.entity_id}')">
          <span class="tog-slider"></span>
        </label>
        ${cycleId ? `<button class="btn-delete" onclick="deleteCycle(${cycleId})" title="Elimina">🗑</button>` : ''}`;
      list.appendChild(div);
    });
  });
}


async function callService(domain, service, entity_id) {
  try {
    await fetch(`${HA_URL}/api/services/${domain}/${service}`, {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/json' },
      body: JSON.stringify({ entity_id })
    });
    setTimeout(refreshStates, 1000);
  } catch(e) {
    console.error('Service call failed', e);
  }
}

function launchQuickstart() {
  const tankSel = parseInt(document.getElementById('qs-tank').value);
  const tank = tankSel;
  const zone = parseInt(document.getElementById('qs-zone').value);
  const dur  = parseInt(document.getElementById('qs-dur').value);
  const payload = JSON.stringify({ tank, nebulization: dur, output_valve: zone });

  document.getElementById('qs-feedback').textContent = 'Invio comando...';

  fetch(`${HA_URL}/api/services/mqtt/publish`, {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/json' },
    body: JSON.stringify({ topic: 'geyser_pro/quickstart/cmd', payload })
  })
  .then(() => {
    document.getElementById('qs-feedback').textContent = 'Comando inviato ✓';
    setTimeout(() => document.getElementById('qs-feedback').textContent = '', 3000);
  })
  .catch(() => {
    document.getElementById('qs-feedback').textContent = 'Errore invio comando';
  });
}

// --- Zona tab ---
let _currentZona = 1;

  _currentZona = zona;
  document.getElementById('tab-zona1').style.background = zona === 1 ? 'var(--green-dim)' : 'none';
  document.getElementById('tab-zona1').style.color = zona === 1 ? 'var(--green)' : 'var(--muted)';
  document.getElementById('tab-zona1').style.borderColor = zona === 1 ? 'var(--green)' : 'var(--border2)';
  document.getElementById('tab-zona2').style.background = zona === 2 ? 'var(--green-dim)' : 'none';
  document.getElementById('tab-zona2').style.color = zona === 2 ? 'var(--green)' : 'var(--muted)';

  // Ricostruisci lista con zona corrente
  if (Object.keys(_lastStates).length) updateUI(_lastStates);

// --- Giorni selector - event delegation ---
document.addEventListener('click', function(e) {
  if (e.target.classList.contains('day-btn')) {
    e.target.classList.toggle('active');
  }
});

function getDaysShifted() {
  // Ritorna array [L,M,M,G,V,S,D] come interi 0/1
  const btns = document.querySelectorAll('#days-grid .day-btn');
  return Array.from(btns).map(b => b.classList.contains('active') ? 1 : 0);
}

function openModal(id) {
  // Pre-imposta la zona corrente nel modal strategia
  if (id === 'modal-strategy') {
    document.getElementById('new-strategy-zone').value = _currentZona;
  }
  document.getElementById(id).classList.add('open');
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

function openCreateCycle(strategyId) {
  document.getElementById('new-cycle-strategy-id').value = strategyId;
  openModal('modal-cycle');
}

async function syncNow() {
  const btn = document.getElementById('sync-btn');
  btn.textContent = '⏳ Sync...';
  btn.disabled = true;
  await mqttPublish('geyser_pro/cmd/reload', {});
  setTimeout(() => {
    refreshStates();
    btn.innerHTML = '✅ Sync';
    btn.disabled = false;
    setTimeout(() => { btn.innerHTML = '🔄 Sync'; }, 2000);
  }, 4000);
}

async function refreshStates() {
  try {
    const r = await fetch(`${HA_URL}/api/states`, {
      headers: { 'Authorization': 'Bearer ' + TOKEN }
    });
    const states = await r.json();
    updateUI(states);
  } catch(e) {
    console.error('refreshStates error', e);
  }
}

async function mqttPublish(topic, payload) {
  return fetch(`${HA_URL}/api/services/mqtt/publish`, {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + TOKEN, 'Content-Type': 'application/json' },
    body: JSON.stringify({ topic, payload: JSON.stringify(payload) })
  });
}

async function deleteStrategy(strategyId) {
  if (!confirm('Eliminare questa strategia e tutti i suoi cicli?')) return;
  await mqttPublish('geyser_pro/cmd/delete_strategy', { strategy_id: strategyId });
  setTimeout(refreshStates, 3000);
  setTimeout(refreshStates, 6000);
}

async function deleteCycle(cycleId) {
  if (!confirm('Eliminare questo ciclo?')) return;
  await mqttPublish('geyser_pro/cmd/delete_cycle', { cycle_id: cycleId });
  setTimeout(refreshStates, 3000);
  setTimeout(refreshStates, 6000);
}

async function confirmCreateStrategy() {
  const name = document.getElementById('new-strategy-name').value.trim();
  const zone = parseInt(document.getElementById('new-strategy-zone').value);
  if (!name) return;
  await mqttPublish('geyser_pro/cmd/create_strategy', { name, output_valve: zone });
  closeModal('modal-strategy');
  document.getElementById('new-strategy-name').value = '';
  setTimeout(refreshStates, 3000);
  setTimeout(refreshStates, 6000);
}

async function confirmCreateCycle() {
  const strategyId  = parseInt(document.getElementById('new-cycle-strategy-id').value);
  const tank        = parseInt(document.getElementById('new-cycle-tank').value);
  const hour        = parseInt(document.getElementById('new-cycle-hour').value);
  const minute      = parseInt(document.getElementById('new-cycle-minute').value);
  const dur         = parseInt(document.getElementById('new-cycle-dur').value);
  const daysShifted = getDaysShifted();
  await mqttPublish('geyser_pro/cmd/create_cycle', {
    strategy_id: strategyId, tank, hour, minute, nebulization: dur, days_shifted: daysShifted
  });
  closeModal('modal-cycle');
  document.querySelectorAll('#days-grid .day-btn').forEach(b => b.classList.add('active'));
  setTimeout(refreshStates, 3000);
  setTimeout(refreshStates, 6000);
}

function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  const ws = new WebSocket(`${proto}://${location.host}/api/websocket`);
  wsConn = ws;

  ws.onopen = () => {
    document.getElementById('conn-dot').style.background='var(--amber)'; document.getElementById('conn-dot').title='Autenticazione...';
  };

  ws.onmessage = (evt) => {
    const msg = JSON.parse(evt.data);

    if (msg.type === 'auth_required') {
      ws.send(JSON.stringify({ type: 'auth', access_token: TOKEN }));
    }

    if (msg.type === 'auth_ok') {
      document.getElementById('conn-dot').style.background='var(--green)'; document.getElementById('conn-dot').style.boxShadow='0 0 6px var(--green)'; document.getElementById('conn-dot').title='Connesso';
      wsId++;
      ws.send(JSON.stringify({ id: wsId, type: 'get_states' }));
      wsId++;
      ws.send(JSON.stringify({ id: wsId, type: 'subscribe_events', event_type: 'state_changed' }));
    }

    if (msg.type === 'result' && Array.isArray(msg.result)) {
      updateUI(msg.result);
    }

    if (msg.type === 'event' && msg.event?.event_type === 'state_changed') {
      const newState = msg.event.data.new_state;
      if (newState && newState.entity_id.includes('geyser')) {
        fetch(`${HA_URL}/api/states`, {
          headers: { 'Authorization': 'Bearer ' + TOKEN }
        })
        .then(r => r.json())
        .then(states => updateUI(states))
        .catch(() => {});
      }
    }
  };

  ws.onclose = () => {
    document.getElementById('conn-dot').style.background='var(--red)'; document.getElementById('conn-dot').style.boxShadow='none'; document.getElementById('conn-dot').title='Disconnesso — riconnessione...';
    setTimeout(connectWS, 3000);
  };

  ws.onerror = () => {
    document.getElementById('conn-dot').style.background='var(--red)'; document.getElementById('conn-dot').title='Errore connessione WebSocket';
  };
}

connectWS();
