<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Geyser PRO</title>
<style>
  body { margin:0; background:#0f1117; color:#e8eaf0; font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
  #loader { min-height:100vh; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:12px; }
  .dot { width:12px; height:12px; border-radius:50%; background:#22d3a0; animation:pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }
  pre { white-space:pre-wrap; color:#fca5a5; max-width:900px; padding:16px; }
</style>
</head>
<body>
<div id="loader"><div class="dot"></div><div>Caricamento Geyser PRO...</div></div>
<script>
(function() {
  const APP_URL = '/local/geyser_dashboard_app.html?v=' + Date.now();
  fetch(APP_URL, { cache: 'no-store' })
    .then(r => {
      if (!r.ok) throw new Error('HTTP ' + r.status + ' su ' + APP_URL);
      return r.text();
    })
    .then(html => {
      document.open();
      document.write(html);
      document.close();
    })
    .catch(err => {
      document.getElementById('loader').innerHTML = '<pre>Errore caricamento dashboard\n' + String(err).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])) + '</pre>';
    });
})();
</script>
</body>
</html>
