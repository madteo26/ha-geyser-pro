name: "Geyser PRO"
version: "0.7.1"
slug: geyser_pro
description: "Integrazione per Stocker Geyser PRO antizanzare - MQTT autodiscovery"
startup: services
boot: auto
init: false
host_network: true

arch:
  - aarch64
  - amd64

options:
  email: ""
  password: ""
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  poll_interval: 7
  log_level: "info"

schema:
  email: str
  password: str
  mqtt_host: str
  mqtt_port: int
  mqtt_username: str
  mqtt_password: str
  poll_interval: int(3,300)
  log_level: list(debug|info|warning|error)