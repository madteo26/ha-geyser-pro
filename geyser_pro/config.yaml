name: "Geyser PRO"
version: "0.8.5"
slug: geyser_pro
description: "Home Assistant integration for Stocker Geyser PRO mosquito repellent systems. MQTT autodiscovery, full CRUD for strategies/cycles, multi-device support."
url: "https://github.com/madteo26/ha-geyser-pro"
startup: services
boot: auto
init: false
host_network: true

map:
  - config:rw

arch:
  - aarch64
  - amd64
  - armv7
  - armhf
  - i386

options:
  devices:
    - id: "casa"
      device_name: "Casa"
      email: ""
      password: ""
      zone_1_name: "Zona 1"
      zone_2_name: "Zona 2"
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  poll_interval: 7
  log_level: "info"
  dashboard_token: ""

schema:
  devices:
    - id: str
      device_name: str
      email: str
      password: str
      zone_1_name: str?
      zone_2_name: str?
  mqtt_host: str
  mqtt_port: int
  mqtt_username: str
  mqtt_password: str
  poll_interval: int(3,300)
  log_level: list(debug|info|warning|error)
  dashboard_token: str?
